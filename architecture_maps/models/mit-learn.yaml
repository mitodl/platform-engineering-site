  - { name: MITx Online (catalog), transport: REST JSON paginated, cadence: every 6h, data: courses + programs, source_ref: { path: "learning_resources/etl/mitxonline.py:154" } }
  - { name: MITx Online (content files), transport: S3, cadence: daily 07:00, data: content, source_ref: { path: "learning_resources/etl/tasks.py:276" } }
  - { name: xPRO (catalog), transport: REST JSON, cadence: daily 05:00, data: catalog, source_ref: { path: "learning_resources/etl/tasks.py:162" } }
  - { name: xPRO / xOnline (files), transport: S3, cadence: daily 08:00, data: content, source_ref: { path: "learning_resources/etl/tasks.py:292" } }
  - { name: MicroMasters, transport: REST JSON, cadence: daily 05:00, data: programs + Wagtail pages, source_ref: { path: "learning_resources/etl/tasks.py:82" } }
  - { name: MIT Professional Ed, transport: REST Drupal feeds JSON, cadence: daily 21:00, data: courses, source_ref: { path: "learning_resources/etl/tasks.py:147" } }
  - { name: Sloan Executive Ed, transport: REST OAuth2-JWT, cadence: daily 04:30, data: courses, source_ref: { path: "learning_resources/etl/tasks.py:154" } }
